name: Watcher

on:
  schedule:
    - cron: '0 6 * * 1'        # weekly, Monday 06:00 UTC
  workflow_dispatch: {}          # run manually anytime from the Actions tab

concurrency:
  group: watcher
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run Watcher
        run: python watcher.py
        env:
          WP_BASE: ${{ secrets.WP_BASE }}
          WP_USER: ${{ secrets.WP_USER }}
          WP_APP_PASS: ${{ secrets.WP_APP_PASS }}
          SLACK_WATCH_WEBHOOK_URL: ${{ secrets.SLACK_WATCH_WEBHOOK_URL }}
          SLACK_BIAS_WEBHOOK_URL: ${{ secrets.SLACK_BIAS_WEBHOOK_URL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
